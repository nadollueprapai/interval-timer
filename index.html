<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Interval Timer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  
  <link rel="icon" type="image/png" href="images/interval-timer-logo.png">
</head>

<header>
  <a href="index.html">
    <img 
      src="images/interval-timer-logo.png" 
      alt="Interval Timer Logo"
      width="150"
    >
  </a>
</header>

<body>

  <div id="bgColor" class="background-color">
    <div class="container py-5">
      <div class="main-card mx-auto">
        <div class="text-center">
          <h1 class="app-title">Task Interval Timer</h1>
          <p class="app-subtitle">Build custom task-based intervals</p>
        </div>
      </div>

      <div class="main-card mx-auto pt-4">

        <!-- DISPLAY -->
        <div class="timer-display text-center">

          <div class="timer-ring-wrapper">
            <div class="timer-ring" id="progressFill">
              <div class="timer-ring-inner">
                <div class="task-name" id="taskIntervalName">
                  Ready?
                </div>

                <div class="current-time" id="currentTime">
                  00:00
                </div>
              </div>
            </div>
          </div>

          <div class="round-counter mt-3" id="roundCounter">
            Round 1 / 8
          </div>

        </div>

        <!-- CONTROLS -->
        <div class="controls d-flex justify-content-center gap-3 flex-wrap mt-5">

          <button id="startBtn" class="btn btn-start">Start</button>
          <button id="pauseBtn" class="btn btn-pause hide">Pause</button>
          <button id="resetBtn" class="btn btn-reset">Reset</button>

        </div>

        <!-- SETTINGS -->
        <div class="settings-card mt-5">

          <div class="d-flex justify-content-between align-items-center flex-wrap gap-4">

            <div class="round-controls">
              <span class="settings-label">Total Rounds</span>

              <div class="counter-box mt-2">
                <button class="counter-btn" id="minusRounds">−</button>
                <span class="counter-value" id="totalRoundsDisplay">8</span>
                <button class="counter-btn" id="plusRounds">+</button>
              </div>
            </div>

            <div class="form-check form-switch sound-switch">
              <input class="form-check-input" type="checkbox" id="soundSwitch" checked>
              <label class="form-check-label">Sound Enabled</label>
            </div>

          </div>

        </div>

        <!-- TASK LIST -->
        <div class="intervals-section mt-5">

          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="section-title mb-0">Task Intervals</h2>

            <button id="addTaskIntervalBtn" class="btn btn-add">
              Add Task
            </button>
          </div>

          <div class="interval-list" id="intervalList"></div>

        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>

</body>

</html>
