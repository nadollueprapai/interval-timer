<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Interval Timer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="images/interval-timer-logo.png">
</head>

<body>
  <header class="app-header">
    <a class="brand" href="index.html">
      <img src="images/interval-timer-logo.png" alt="Interval Timer Logo" width="120">
      <span>Interval Timer</span>
    </a>
  </header>

  <main class="app-shell">
    <div id="bgColor" class="background-color">
      <div class="container py-5">
        <div class="main-card mx-auto">
          <div class="text-center">
            <h1>Task Interval Timer</h1>
            <p>Build custom task-based intervals</p>
          </div>
        </div>

        <div class="main-card mx-auto pt-4">
          <div class="timer-display text-center">
            <div class="timer-display-inner">
              <div id="taskIntervalName">Ready?</div>
              <div id="currentTime">00:00</div>
            </div>

            <div id="roundCounter">Round 1 / 8</div>

            <div class="form-check form-switch sound-switch">
              <input class="form-check-input" type="checkbox" id="soundSwitch" checked>
              <label class="form-check-label">Sound Enabled</label>
            </div>
          </div>

          <div class="controls mt-5">
            <button id="startBtn" type="button">Start</button>
            <button id="pauseBtn" type="button" class="hide">Pause</button>
            <button id="resetBtn" type="button">Reset</button>
          </div>

          <div class="settings-card mt-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-4">
              <div class="round-controls">
                <span>Total Rounds</span>

                <div class="counter-box mb-5">
                  <button id="minusRounds" type="button">−</button>
                  <input class="counter-value" id="totalRoundsDisplay" type="number" min="1" value="8" />
                  <button id="plusRounds" type="button">+</button>
                </div>

                <span>Task Intervals</span>
                <button id="addTaskIntervalBtn" type="button">Add Task</button>
                
                <div class="interval-list" id="intervalList"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
